name: CD

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - main-*
      - develop
      - qa
      - stg

jobs:
  setup:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      env_value: ${{ steps.set_env.outputs.env_value }}
    steps:
      - name: set environment
        id: set_env
        run: |
          case "${{ github.event.pull_request.base.ref }}" in
            main|main-*)
              echo "env_value=production" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "env_value=dev" >> "$GITHUB_OUTPUT"
              ;;
            qa)
              echo "env_value=qa" >> "$GITHUB_OUTPUT"
              ;;
            stg)
              echo "env_value=stg" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${{ github.event.pull_request.base.ref }}"
              exit 1
              ;;
          esac

  deploy:
    if: github.event.pull_request.merged == true
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: read
    environment:
      name: ${{ needs.setup.outputs.env_value }}
    outputs:
      username: ${{ steps.bff_sst_deploy.outputs.username }}
      password: ${{ steps.bff_sst_deploy.outputs.password }}
      database: ${{ steps.bff_sst_deploy.outputs.database }}
      host: ${{ steps.bff_sst_deploy.outputs.host }}
      port: ${{ steps.bff_sst_deploy.outputs.port }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v1.5

      - uses: ./.github/actions/setup-pnpm
        with:
          node_version: 22
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: ${{ secrets.AWS_OPEN_ID_CONNECT_ROLE }}

      - name: Set script bucket name
        run: |
          echo "CLICKHOUSE_SCRIPT_BUCKET=langfuse-clickhouse-script-${{ needs.setup.outputs.env_value }}" >> "$GITHUB_ENV"
          echo "CLICKHOUSE_SCRIPT_PREFIX=clickhouse/${{ needs.setup.outputs.env_value }}" >> "$GITHUB_ENV"

      - name: Upload clickhouse scripts to S3
        run: |
          aws s3 cp \
            infra/scripts/clickhouse/backup_clickhouse.sh \
            "s3://${CLICKHOUSE_SCRIPT_BUCKET}/${CLICKHOUSE_SCRIPT_PREFIX}/backup_clickhouse.sh" \
            --sse AES256

          aws s3 cp \
            infra/scripts/clickhouse/restore_clickhouse.sh \
            "s3://${CLICKHOUSE_SCRIPT_BUCKET}/${CLICKHOUSE_SCRIPT_PREFIX}/restore_clickhouse.sh" \
            --sse AES256

      - name: Verify uploaded scripts
        run: |
          aws s3 ls "s3://${CLICKHOUSE_SCRIPT_BUCKET}/${CLICKHOUSE_SCRIPT_PREFIX}/"
      - name: sst-langfuse sst unlock
        run: pnpm --filter sst-langfuse run unlock --stage ${{ needs.setup.outputs.env_value }}

      # - name: sst-langfuse sst remove
      #   run: pnpm --filter sst-langfuse run remove --stage ${{ needs.setup.outputs.env_value }}

      - name: sst-langfuse sst refresh
        run: pnpm --filter sst-langfuse run refresh --stage ${{ needs.setup.outputs.env_value }} --verbose --print-logs

      - name: langfuse sst deploy
        id: langfuse_sst_deploy
        run: pnpm run deploy --stage ${{ needs.setup.outputs.env_value }} --verbose --print-logs
